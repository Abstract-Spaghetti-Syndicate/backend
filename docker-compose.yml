version: '3.8'

services:
  backend:
    build: .
    container_name: printer-filament-manager
    restart: unless-stopped
    
    # МОНТУВАННЯ ПАПКИ ДЛЯ БАЗИ ДАНИХ
    # Ваші користувачі та котушки тепер зберігатимуться у папці "./data" на вашому сервері
    volumes:
      - ./data:/app/data

    # МЕРЕЖЕВИЙ РЕЖИМ HOST
    # Запускає контейнер прямо у мережі хоста. Це життєво необхідно на Linux-серверах,
    # щоб mDNS (автопошук) міг бачити ваш принтер зсередини Docker.
    network_mode: "host"

    # Примітка: Якщо ви деплоїте на Windows/macOS сервер (де режим "host" не підтримується),
    # закоментуйте рядок `network_mode: "host"` і розкоментуйте порти нижче:
    # ports:
    #   - "8000:8000"